<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>图像质量指标RAG智能体</title>
</head>
<body>
    <h1>基于Qwen3.7-Plus的计算机视觉专业RAG智能体</h1>
    <h3>项目介绍</h3>
    <p>1. 大语言模型：qwen3.7-plus</p>
    <p>2. 向量嵌入模型：text-embedding-v2</p>
    <p>3. 知识库：4份数字图像处理专业PDF文档</p>
    <h3>项目文件说明</h3>
    <ul>
        <li>build_rag.py：读取PDF构建Chroma向量库</li>
        <li>agent.py：核心RAG检索问答逻辑</li>
        <li>web_demo.py：Gradio可视化对话界面</li>
    </ul>
    <h3>运行流程</h3>
    <p>1. 执行build_rag.py生成向量库</p>
    <p>2. 运行agent.py控制台问答 / 运行web_demo.py打开可视化网页对话</p>
</body>
</html>
